<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WalletFlow | Personal Finance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [transactions, setTransactions] = useState(
                JSON.parse(localStorage.getItem('txs')) || []
            );
            const [text, setText] = useState('');
            const [amount, setAmount] = useState('');

            // Save to LocalStorage (or Firebase later)
            useEffect(() => {
                localStorage.setItem('txs', JSON.stringify(transactions));
            }, [transactions]);

            const total = transactions.reduce((acc, t) => acc + t.amount, 0).toFixed(2);
            const income = transactions.filter(t => t.amount > 0).reduce((acc, t) => acc + t.amount, 0).toFixed(2);
            const expense = Math.abs(transactions.filter(t => t.amount < 0).reduce((acc, t) => acc + t.amount, 0)).toFixed(2);

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!text || !amount) return;
                setTransactions([{ id: Date.now(), text, amount: +amount }, ...transactions]);
                setText(''); setAmount('');
            };

            const deleteTx = (id) => setTransactions(transactions.filter(t => t.id !== id));

            return (
                <div className="min-h-screen text-slate-200 p-6 md:p-12">
                    <div className="max-w-md mx-auto">
                        <div className="flex justify-between items-center mb-10">
                            <h1 className="text-2xl font-bold tracking-tight">Wallet<span className="text-indigo-500">Flow</span></h1>
                            <div className="w-10 h-10 bg-indigo-600 rounded-full flex items-center justify-center shadow-lg shadow-indigo-500/40">
                                <i data-lucide="wallet" className="w-5 h-5 text-white"></i>
                            </div>
                        </div>

                        {/* Balance Card */}
                        <div className="bg-gradient-to-br from-indigo-600 to-violet-700 p-8 rounded-[2.5rem] shadow-2xl mb-10 relative overflow-hidden">
                            <p className="text-indigo-100 text-sm font-medium opacity-70 uppercase tracking-widest">Available Balance</p>
                            <h2 className="text-5xl font-extrabold text-white mt-2 mb-8">${total}</h2>
                            <div className="flex gap-4">
                                <div className="flex-1 glass p-4 rounded-2xl">
                                    <p className="text-emerald-400 text-xs font-bold uppercase mb-1">Income</p>
                                    <p className="text-xl font-bold text-white">${income}</p>
                                </div>
                                <div className="flex-1 glass p-4 rounded-2xl">
                                    <p className="text-rose-400 text-xs font-bold uppercase mb-1">Expense</p>
                                    <p className="text-xl font-bold text-white">${expense}</p>
                                </div>
                            </div>
                        </div>

                        {/* Input Form */}
                        <form onSubmit={handleSubmit} className="space-y-4 mb-12">
                            <input 
                                className="w-full bg-slate-800/50 border border-slate-700 rounded-2xl p-4 outline-none focus:ring-2 ring-indigo-500 transition-all text-white"
                                placeholder="Description (e.g. Salary, Groceries)"
                                value={text} onChange={(e) => setText(e.target.value)}
                            />
                            <div className="flex gap-3">
                                <input 
                                    type="number"
                                    className="flex-grow bg-slate-800/50 border border-slate-700 rounded-2xl p-4 outline-none focus:ring-2 ring-indigo-500 text-white"
                                    placeholder="Amount (- for expense)"
                                    value={amount} onChange={(e) => setAmount(e.target.value)}
                                />
                                <button className="bg-indigo-500 hover:bg-indigo-400 p-4 rounded-2xl text-white transition-all transform active:scale-95 shadow-lg">
                                    <i data-lucide="plus" className="w-6 h-6"></i>
                                </button>
                            </div>
                        </form>

                        {/* Transactions List */}
                        <h3 className="text-sm font-bold text-slate-500 uppercase tracking-[0.2em] mb-6">Recent History</h3>
                        <div className="space-y-4">
                            {transactions.length === 0 && <p className="text-slate-600 text-center py-10">No transactions yet.</p>}
                            {transactions.map(t => (
                                <div key={t.id} className="glass p-5 rounded-3xl flex justify-between items-center group animate-in fade-in duration-500">
                                    <div className="flex items-center gap-4">
                                        <div className={`p-3 rounded-2xl ${t.amount > 0 ? 'bg-emerald-500/10 text-emerald-500' : 'bg-rose-500/10 text-rose-500'}`}>
                                            <i data-lucide={t.amount > 0 ? 'trending-up' : 'trending-down'} className="w-5 h-5"></i>
                                        </div>
                                        <div>
                                            <p className="font-semibold text-white">{t.text}</p>
                                            <p className="text-xs text-slate-500">Today</p>
                                        </div>
                                    </div>
                                    <div className="flex items-center gap-4">
                                        <p className={`font-bold text-lg ${t.amount > 0 ? 'text-emerald-400' : 'text-rose-400'}`}>
                                            {t.amount > 0 ? '+' : ''}{t.amount}
                                        </p>
                                        <button onClick={() => deleteTx(t.id)} className="text-slate-600 hover:text-rose-500 transition-all opacity-0 group-hover:opacity-100">
                                            <i data-lucide="trash-2" className="w-4 h-4"></i>
                                        </button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // Initialize icons after React renders
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
